<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Cadastro de Clientes</title>

    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/home.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="cadastrar.html"><button>Cadastrar</button></a></li>
                <li><a href="consultar.html"><button>Consultar</button></a></li>
                <li><a href="relatorio.html"><button>Relatórios</button></a></li>
                <li><a href="auditoria.html"><button>Auditoria</button></a></li>
                <li class="home-li"><a href="home.html"><button>Home</button></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">

            <h1>Cadastro de Clientes</h1>

            <form id="formCadastro">

                <label>Nome Completo</label>
                <input type="text" id="nome" required>

                <label>CPF</label>
                <input type="text" id="cpf" required>

                <label>Idade</label>
                <input type="number" id="idade" required>

                <label>Cidade</label>
                <input type="text" id="cidade" required>

                <button type="button" onclick="cadastrarCliente()">
                    Cadastrar Cliente
                </button>

            </form>

        </div>

        <script src="../js/banco.js"></script>
        <script src="../js/cadastrar.js"></script>
    </main>

</body>

</html>
